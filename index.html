<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7086281720678002" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-7086281720678002">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Apps Menu</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 2rem;
            font-size: 2.5rem;
            color: #2c3e50;
        }

        .menu-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 1rem;
        }

        .menu-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 300px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .menu-card h2 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .menu-card p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .menu-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <h1>당신의 운명을 AI 가 분석해 드립니다.</h1>
    <div class="menu-container">
        <a href="face_view/index.html" class="menu-card">
            <div class="icon">👤</div>
            <h2>관상</h2>
            <p>AI가 당신의 얼굴을 분석하여 숨겨진 운명과 성격을 알려드립니다.</p>
        </a>
        <a href="washcoat_palmistry/index.html" class="menu-card">
            <div class="icon">✋</div>
            <h2>손금</h2>
            <p>AI가 당신의 손금을 분석하여 건강, 재물, 사랑의 운을 보여드립니다.</p>
        </a>
        <a href="saju/index.html" class="menu-card">
            <div class="icon">☯️</div>
            <h2>사주</h2>
            <p>당신의 생년월일시를 분석하여 타고난 운명과 미래를 예측해 드립니다.</p>
        </a>
    </div>
</body>
</html>
